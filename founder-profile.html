<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Founder Profile | PostHire</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary-bg:#0a0a0a;--card-bg:rgba(25,25,25,0.6);--text-primary:#ffffff;--text-secondary:#a0a0a0;--border-color:rgba(255,255,255,0.1)}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--primary-bg);color:var(--text-primary);min-height:100vh;padding:40px 20px}
        .container{max-width:800px;margin:0 auto}
        .card{background:var(--card-bg);border:1px solid var(--border-color);border-radius:16px;padding:40px;backdrop-filter:blur(10px)}
        .header{text-align:center;margin-bottom:36px}
        .header h1{font-size:34px;margin-bottom:8px}
        .header p{color:var(--text-secondary)}
        .section-title{font-size:20px;margin-bottom:18px;display:flex;align-items:center;gap:10px;padding-top:24px;border-top:1px solid var(--border-color);margin-top:24px}
        .section-title:first-of-type{border-top:none;padding-top:0;margin-top:0}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;margin-bottom:7px;font-size:14px;font-weight:500}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid var(--border-color);border-radius:8px;color:white;font-size:15px;font-family:inherit;transition:border-color 0.2s}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:rgba(255,255,255,0.3)}
        .form-group select option{background:#1a1a1a}
        .form-group textarea{min-height:100px;resize:vertical}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
        .btn-submit{width:100%;background:white;color:black;padding:14px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:16px;transition:transform 0.2s;margin-top:8px}
        .btn-submit:hover:not(:disabled){transform:scale(1.02)}
        .btn-submit:disabled{opacity:0.6;cursor:not-allowed}
        .back-link{display:inline-flex;align-items:center;gap:8px;color:var(--text-secondary);text-decoration:none;margin-bottom:20px;transition:color 0.2s;font-size:14px}
        .back-link:hover{color:white}
        .err-msg{background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px;display:none}
        .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:sp 0.7s linear infinite;margin-right:6px}
        @keyframes sp{to{transform:rotate(360deg)}}
        @media(max-width:600px){.card{padding:24px 16px}.form-row{grid-template-columns:1fr}.header h1{font-size:26px}}
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <div class="card">
        <div class="header">
            <h1>🚀 Setup Founder Profile</h1>
            <p>Connect with the best creators for your startup</p>
        </div>
        <div id="errMsg" class="err-msg"></div>

        <h3 class="section-title"><i class="fas fa-rocket"></i> Startup Information</h3>
        <div class="form-group"><label>Startup Name *</label><input type="text" id="startupName" placeholder="e.g., TechStart Inc."></div>
        <div class="form-group">
            <label>Startup Description *</label>
            <textarea id="description" placeholder="Tell creators about your startup, what you do, and your target audience..."></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Industry *</label>
                <select id="industry">
                    <option value="">Select Industry</option>
                    <option value="SaaS">SaaS</option>
                    <option value="Fintech">Fintech</option>
                    <option value="E-commerce">E-commerce</option>
                    <option value="HealthTech">HealthTech</option>
                    <option value="EdTech">EdTech</option>
                    <option value="AI/ML">AI/ML</option>
                    <option value="Consumer">Consumer</option>
                    <option value="B2B">B2B</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group"><label>Website <span style="color:var(--text-secondary);font-size:11px;">(optional)</span></label><input type="url" id="website" placeholder="https://yourstartup.com"></div>
        </div>

        <h3 class="section-title"><i class="fas fa-handshake"></i> Collaboration Details</h3>
        <div class="form-row">
            <div class="form-group">
                <label>Budget Range *</label>
                <select id="budget">
                    <option value="">Select Budget</option>
                    <option value="Under ₹10K">Under ₹10,000</option>
                    <option value="₹10K-₹25K">₹10,000 - ₹25,000</option>
                    <option value="₹25K-₹50K">₹25,000 - ₹50,000</option>
                    <option value="₹50K-₹1L">₹50,000 - ₹1,00,000</option>
                    <option value="₹1L+">₹1,00,000+</option>
                </select>
            </div>
            <div class="form-group">
                <label>Collaboration Type *</label>
                <select id="collabType">
                    <option value="">Select Type</option>
                    <option value="Sponsored Posts">Sponsored Posts</option>
                    <option value="Product Review">Product Review</option>
                    <option value="Brand Ambassador">Brand Ambassador</option>
                    <option value="Content Creation">Content Creation</option>
                    <option value="Long-term Partnership">Long-term Partnership</option>
                </select>
            </div>
        </div>
        <div class="form-group"><label>Looking For (Niches) <span style="color:var(--text-secondary);font-size:11px;">(optional)</span></label><input type="text" id="lookingFor" placeholder="e.g., Tech, SaaS, Startup creators"></div>

        <button class="btn-submit" id="submitBtn" onclick="saveProfile()">Complete Profile Setup →</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
if(!firebase.apps.length){firebase.initializeApp({apiKey:"AIzaSyD1ElccdzrwPwKDmGimitEkQEwNMrUeHyE",authDomain:"posthire-81b69.firebaseapp.com",projectId:"posthire-81b69",storageBucket:"posthire-81b69.firebasestorage.app",messagingSenderId:"898539356038",appId:"1:898539356038:web:36f8134549ce5f13333607"});}
var auth=firebase.auth(), db=firebase.firestore();
var currentUser=null;

auth.onAuthStateChanged(function(user){
    if(!user){window.location.href='index.html';return;}
    currentUser=user;
    db.collection('founders').doc(user.uid).get().then(function(doc){
        if(!doc.exists)return;
        var d=doc.data();
        ['startupName','description','industry','website','budget','collabType','lookingFor'].forEach(function(id){var el=document.getElementById(id);if(el&&d[id])el.value=d[id];});
        var btn=document.getElementById('submitBtn');if(btn)btn.textContent='Update Profile →';
    });
});

window.saveProfile=function(){
    var errEl=document.getElementById('errMsg');errEl.style.display='none';
    if(!currentUser){errEl.textContent='Not logged in.';errEl.style.display='block';return;}
    var sName=document.getElementById('startupName').value.trim();
    var desc=document.getElementById('description').value.trim();
    var ind=document.getElementById('industry').value;
    var bud=document.getElementById('budget').value;
    var ct=document.getElementById('collabType').value;
    if(!sName||!desc){errEl.textContent='Please fill Startup Name and Description.';errEl.style.display='block';return;}
    if(!ind||!bud||!ct){errEl.textContent='Please fill Industry, Budget, and Collaboration Type.';errEl.style.display='block';return;}
    var btn=document.getElementById('submitBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>Saving...';
    db.collection('users').doc(currentUser.uid).get().then(function(uDoc){
        var u=uDoc.exists?uDoc.data():{};
        var profile={userId:currentUser.uid,name:u.name||'',email:u.email||'',whatsapp:u.whatsapp||'',startupName:sName,description:desc,industry:ind,website:document.getElementById('website').value.trim(),budget:bud,collabType:ct,lookingFor:document.getElementById('lookingFor').value.trim(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
        return db.collection('founders').doc(currentUser.uid).set(profile);
    }).then(function(){
        return db.collection('users').doc(currentUser.uid).update({profileComplete:true});
    }).then(function(){
        window.location.href='dashboard.html';
    }).catch(function(e){
        errEl.textContent='Failed: '+e.message;errEl.style.display='block';
        btn.disabled=false;btn.textContent='Complete Profile Setup →';
    });
};
</script>
</script>
</body>
</html>
